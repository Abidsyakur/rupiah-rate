# dbt project configuration
name: 'rupiah_analytics'
version: '1.0.0'
config-version: 2

profile: 'rupiah_analytics'

model-paths: ["models"]
analysis-paths: ["analysis"]
test-paths: ["tests"]
data-paths: ["data"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]

target-path: "target"
clean-targets:
  - "target"
  - "dbt_packages"

models:
  rupiah_analytics:
    staging:
      materialized: table
      schema: staging
    intermediate:
      materialized: table
      schema: intermediate
    marts:
      materialized: table
      schema: marts

seeds:
  rupiah_analytics:
    schema: seeds
    database: rupiah_rates
