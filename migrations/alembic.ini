# migrations/alembic.ini
# ======================
# Alembic configuration for rupiah-exchange-rate-intelligence.
#
# DATABASE_URL is read from the environment in env.py; the value here
# is only a fallback for local ad-hoc usage.  Never commit credentials.
#
# Usage:
#   alembic -c migrations/alembic.ini upgrade head
#   alembic -c migrations/alembic.ini downgrade -1
#   alembic -c migrations/alembic.ini history --verbose

[alembic]
# Path to the migration scripts
script_location = %(here)s

# Fallback URL (overridden by DATABASE_URL env var in env.py)
sqlalchemy.url = postgresql://postgres:postgres@localhost:5432/rupiah_exchange

# Logging format
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S